name: Quality Check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup uv (The modern way)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true      # Automatically caches your Python dependencies
          version: "latest"

      - name: Setup Python
        run: uv python install 3.12

      - name: Sync Python dependencies
        run: uv sync --group dev

      # 2. Install C++ tooling
      - name: Install clang-format, clang-tidy, pybind11
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy pybind11-dev

      # 3. C++ Format Check (non-mutating)
      - name: C++ clang-format check
        run: |
          clang-format --dry-run --Werror $(git ls-files "*.cpp")

      # 4. Configure CMake for clang-tidy (generates compile_commands.json)
      - name: Configure CMake for analysis
        run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DHADRONIS_ENABLE_SIMD=ON

      # 5. C++ static analysis with clang-tidy
      - name: C++ clang-tidy
        run: clang-tidy $(git ls-files "*.cpp") -p build

      # 6. Python Quality Checks (Using uv run)
      - name: Python Linting & Format Check
        run: |
          uv run ruff check python/
          uv run ruff format --check python/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Setup Python
        run: uv python install 3.12

      - name: Sync Python dependencies
        run: uv sync --group dev

      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pybind11-dev

      - name: Run Tests (Python + C++)
        run: |
          # Run Python tests in the uv-managed environment (project already installed by `uv sync`)
          uv run pytest tests/ --durations=5

          # Build C++ targets and run C++ tests
          cmake -S . -B build -DHADRONIS_ENABLE_SIMD=ON
          cmake --build build
          ctest --test-dir build

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install build tooling
        run: |
          uv python install 3.12
          uv sync --group dev
          uv pip install twine

      - name: Build wheel and sdist
        run: uv run python -m build

      - name: Check built artifacts metadata
        run: uv run twine check dist/*
