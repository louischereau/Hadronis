name: Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # 2. Install uv (tool manager for Python workflow)
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      # 3. Create virtual environment
      - name: Create virtual environment
        run: uv venv

      # 4. Install required tools
      - name: Install tools
        run: |
          uv pip install twine
          uv pip install python-semantic-release==7.34.6
          uv pip install build
      # 5. Semantic-release: compute version, commit, tag, build, PyPI + GitHub release
      - name: Semantic release (version bump + commit + tag)
        working-directory: ${{ github.workspace }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          uv run semantic-release publish \
            -v DEBUG \
            -D commit_author="github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wheels:
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel

      - name: Build wheels with cibuildwheel
        run: python -m cibuildwheel --output-dir dist

      - name: Upload wheels to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --notes ""
          fi
          gh release upload "$TAG" dist/*.whl --clobber
